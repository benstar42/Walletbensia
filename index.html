<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Firebase Wallet Demo</title>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1e293b;
padding:20px;
border-radius:10px;
width:300px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
}

button{
width:100%;
padding:10px;
margin-top:5px;
cursor:pointer;
}

.hidden{display:none;}

.balance{
font-size:22px;
margin:10px 0;
color:#22c55e;
}
</style>
</head>

<body>

<div class="box">

<h2>Wallet Demo</h2>

<div id="authBox">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="register()">Enskri</button>
<button onclick="login()">Konekte</button>
</div>

<div id="app" class="hidden">
<p>Byenveni 👋</p>

<div class="balance">
Balans: <span id="balance">0</span> HTG
</div>

<input id="amount" type="number" placeholder="Montan">

<button onclick="addMoney()">Ajoute</button>
<button onclick="removeMoney()">Retire</button>
<button onclick="logout()">Dekonekte</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getDatabase,
ref,
set,
get,
update
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCiLZ4Aj0WqqHzEPe9L6FsoLO8KN2WJ5qw",
authDomain: "bensia-e2a4d.firebaseapp.com",
databaseURL: "https://bensia-e2a4d-default-rtdb.firebaseio.com/",
projectId: "bensia-e2a4d",
storageBucket: "bensia-e2a4d.firebasestorage.app",
messagingSenderId: "697749422261",
appId: "1:697749422261:web:2fe13d52e7211772c53efc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentUser = null;

// REGISTER
window.register = async function(){
let email = document.getElementById("email").value;
let pass = document.getElementById("pass").value;

const userCred = await createUserWithEmailAndPassword(auth, email, pass);

await set(ref(db, "users/" + userCred.user.uid), {
email: email,
balance: 1000
});

alert("Kont kreye ✔");
}

// LOGIN
window.login = async function(){
let email = document.getElementById("email").value;
let pass = document.getElementById("pass").value;

await signInWithEmailAndPassword(auth, email, pass);
}

// LOGOUT
window.logout = function(){
signOut(auth);
}

// LOAD BALANCE
async function loadBalance(uid){
const snap = await get(ref(db, "users/" + uid));
if(snap.exists()){
document.getElementById("balance").innerText = snap.val().balance;
}
}

// ADD MONEY
window.addMoney = async function(){
let amount = Number(document.getElementById("amount").value);

const userRef = ref(db, "users/" + currentUser.uid);
const snap = await get(userRef);

let newBalance = snap.val().balance + amount;

await update(userRef, {balance: newBalance});

loadBalance(currentUser.uid);
}

// REMOVE MONEY
window.removeMoney = async function(){
let amount = Number(document.getElementById("amount").value);

const userRef = ref(db, "users/" + currentUser.uid);
const snap = await get(userRef);

let newBalance = snap.val().balance - amount;

if(newBalance < 0){
alert("Pa gen ase lajan!");
return;
}

await update(userRef, {balance: newBalance});

loadBalance(currentUser.uid);
}

// AUTH STATE
onAuthStateChanged(auth, (user)=>{
if(user){
currentUser = user;
document.getElementById("authBox").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
loadBalance(user.uid);
}else{
currentUser = null;
document.getElementById("authBox").classList.remove("hidden");
document.getElementById("app").classList.add("hidden");
}
});

</script>

</body>
</html>
